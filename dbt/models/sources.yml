version: 2

sources:
  - name: bronze_lake
    description: >
      Bronze layer of the data lake — Parquet snapshots of source Postgres tables,
      written under /warehouse/bronze/<table>/data.parquet by scripts/snapshot_to_parquet.py.
      In a streaming setup this same layer is fed by the Debezium → Kafka → consumer path.
    meta:
      external_location: "/warehouse/bronze"
    tables:
      - name: users
        identifier: "read_parquet('/warehouse/bronze/users/data.parquet')"
        columns:
          - name: id
            description: User UUID
          - name: email
          - name: signup_at
          - name: plan
      - name: orgs
        identifier: "read_parquet('/warehouse/bronze/orgs/data.parquet')"
      - name: subscriptions
        identifier: "read_parquet('/warehouse/bronze/subscriptions/data.parquet')"
      - name: events
        identifier: "read_parquet('/warehouse/bronze/events/data.parquet')"
