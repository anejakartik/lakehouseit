version: 2

sources:
  - name: bronze_lake
    description: >
      Bronze layer of the data lake — Parquet snapshots of source Postgres tables,
      written under /warehouse/bronze/<table>/data.parquet by scripts/snapshot_to_parquet.py.
      In a streaming setup this same layer is fed by the Debezium → Kafka → consumer path.
    meta:
      # dbt-duckdb expands {name} to the table identifier at compile time and
      # rewrites refs as `read_parquet('<external_location>')`.
      external_location: "/warehouse/bronze/{name}/data.parquet"
    tables:
      - name: users
        columns:
          - name: id
            description: User UUID
          - name: email
          - name: signup_at
          - name: plan
      - name: orgs
      - name: subscriptions
      - name: events
