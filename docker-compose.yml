# docker-compose.yml — lakehouseit
#
# Two-track pipeline:
#   1. Batch (default for the demo):  Postgres → snapshot_to_parquet.py → warehouse/bronze/ → dbt → DuckDB
#   2. Streaming (advanced):         Postgres → Debezium → Kafka → (consumer to Iceberg, on roadmap)
#
# The batch track produces the same downstream artifacts the streaming track
# would, so dbt models build identically against either feed.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: lakehouseit
      POSTGRES_DB: appdb
    ports:
      - "${LAKEHOUSEIT_PG_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: ["postgres", "-c", "wal_level=logical"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  seeder:
    build:
      context: .
      dockerfile: scripts/Dockerfile
    command: ["scripts/seed_postgres.py"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: lakehouseit
      POSTGRES_DB: appdb
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["seed", "all"]
    restart: "no"

  snapshotter:
    build:
      context: .
      dockerfile: scripts/Dockerfile
    command: ["scripts/snapshot_to_parquet.py"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: lakehouseit
      POSTGRES_DB: appdb
      LAKEHOUSEIT_WAREHOUSE: /warehouse
    volumes:
      - warehouse:/warehouse
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["snapshot", "all"]
    restart: "no"

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: lakehouseit-cluster-001
    ports:
      - "${LAKEHOUSEIT_KAFKA_PORT:-9092}:9092"
    profiles: ["streaming", "all"]

  debezium:
    image: debezium/connect:2.7
    depends_on:
      - postgres
      - kafka
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: connect-cluster
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    ports:
      - "${LAKEHOUSEIT_CONNECT_PORT:-8083}:8083"
    profiles: ["streaming", "all"]

  iceberg-rest:
    image: apache/iceberg-rest-fixture:latest
    ports:
      - "${LAKEHOUSEIT_ICEBERG_PORT:-8181}:8181"
    environment:
      CATALOG_WAREHOUSE: /tmp/warehouse
    volumes:
      - iceberg-warehouse:/tmp/warehouse
    profiles: ["streaming", "all"]

  dbt:
    build:
      context: ./dbt
    image: lakehouseit-dbt:latest
    working_dir: /usr/app
    environment:
      DBT_PROFILES_DIR: /usr/app
    volumes:
      - ./dbt:/usr/app
      - warehouse:/warehouse
    # Keep the container alive so you can `docker compose exec dbt dbt run`.
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  postgres-data:
  warehouse:
  iceberg-warehouse:
